name: fruitify_dashboard
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  skeletonizer: ^2.1.3
  dartz: ^0.10.1
  firebase_storage: ^13.1.0
  path: ^1.9.1
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  cloud_firestore: ^6.1.3
  modal_progress_hud_nsn: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
